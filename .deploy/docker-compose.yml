services:
  front:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: lecreuset-front
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.front-prod.rule=Host(`${VITE_DOMAIN_NAME:-lagrenaille.fr}`)"
      - "traefik.http.routers.front-prod.entrypoints=websecure"
      - "traefik.http.routers.front-prod.tls.certresolver=myresolver"
      - "traefik.http.services.front-prod.loadbalancer.server.port=80"

networks:
  proxy:
    external: true
