server {
  listen 80;
  server_name _; # Accepte tout nom de domaine (géré par Traefik en amont)

  # Compression GZIP (Indispensable en production)
  gzip on;
  gzip_vary on;
  gzip_min_length 10240;
  gzip_proxied expired no-cache no-store private auth;
  gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml font/woff2 image/svg+xml;
  gzip_disable "MSIE [1-6]\.";

  # Racine du site
  root /usr/share/nginx/html;
  index index.html;

  # Gestion du routing SPA (Single Page Application)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Mise en cache des assets statiques (images, css, js)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
    expires 1y;
    add_header Cache-Control "public, no-transform";
  }

  # Gestion des erreurs
  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
